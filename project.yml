name: SkillsSeer
options:
  bundleIdPrefix: dev.zackbart
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
packages:
  Yams:
    url: https://github.com/jpsim/Yams
    from: "5.0.6"
targets:
  SkillsSeer:
    type: application
    platform: macOS
    sources:
      - path: Sources
    dependencies:
      - package: Yams
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.zackbart.skillsseer
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: SkillsSeer
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        INFOPLIST_KEY_NSHumanReadableCopyright: "MIT Licensed"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
