name: Skillz
options:
  bundleIdPrefix: dev.zackbart
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
packages:
  Yams:
    url: https://github.com/jpsim/Yams
    from: "5.0.6"
targets:
  Skillz:
    type: application
    platform: macOS
    sources:
      - path: Sources
    dependencies:
      - package: Yams
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.zackbart.skillz
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Skillz
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        INFOPLIST_KEY_NSHumanReadableCopyright: "MIT Licensed"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
    scheme:
      testTargets:
        - SkillzTests
  SkillzTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: Skillz
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.zackbart.skillzTests
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES
