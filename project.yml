name: Loadout
options:
  bundleIdPrefix: dev.zackbart
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
packages:
  Yams:
    url: https://github.com/jpsim/Yams
    from: "5.0.6"
targets:
  Loadout:
    type: application
    platform: macOS
    sources:
      - path: Sources
    dependencies:
      - package: Yams
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.zackbart.loadout
        MARKETING_VERSION: "0.0.2"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Loadout
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        INFOPLIST_KEY_NSHumanReadableCopyright: "MIT Licensed"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
    scheme:
      testTargets:
        - LoadoutTests
  LoadoutTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: Loadout
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.zackbart.loadoutTests
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES
